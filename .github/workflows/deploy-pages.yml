name: Deploy GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Prepare site
        shell: bash
        run: |
          mkdir -p _site
          cp -R index.html game.js styles.css manifest.webmanifest sw.js icons data README.md size60-minus-size50-current.txt _site/
          mkdir -p _site/french_game
          cp -R build/french_game/. _site/french_game/
          mkdir -p _site/french_game/icons
          cp -R icons/. _site/french_game/icons/
          mkdir -p _site/capitals_game
          cp -R build/capitals_game/. _site/capitals_game/
          mkdir -p _site/capitals_game/icons
          cp -R icons/. _site/capitals_game/icons/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

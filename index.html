<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nine Letters</title>
  <meta name="theme-color" content="#f1ddbb">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Nine Letters">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="icons/icon.svg">
  <link rel="stylesheet" href="styles.css?v=20260412-biggergrid">
</head>
<body>
  <div class="page-shell">
    <div class="glow glow-one"></div>
    <div class="glow glow-two"></div>

    <main class="app">
      <section class="hero-card">
        <p class="eyebrow">Word Hunt</p>
        <h1>Nine Letters</h1>
        <div class="progress-card">
          <div class="progress-copy">
            <span>Progress</span>
            <strong id="progress-copy">0 / 0</strong>
          </div>
          <div class="progress-track" aria-hidden="true">
            <div class="progress-fill" id="progress-fill"></div>
          </div>
        </div>

        <div class="letter-stage">
          <div class="letter-grid" id="letter-grid" aria-label="Letter board"></div>
          <div class="board-controls">
            <button class="shuffle-button" id="shuffle-button" type="button">Shuffle</button>
            <div class="board-actions">
              <button class="danger-button" id="give-up-button" type="button">I give up</button>
              <button class="secondary-button" id="new-game-button" type="button">New game</button>
              <button class="secondary-button" id="clear-button" type="button">Clear</button>
              <button class="primary-button" id="submit-button" type="button">Submit</button>
            </div>
          </div>
        </div>
      </section>

      <section class="play-card">
        <div class="current-word-panel" aria-live="polite">
          <span class="current-word-label">Current word</span>
          <strong class="current-word-value" id="current-word">Tap letters</strong>
        </div>

        <p class="status-line" id="status-line" aria-live="polite">
          Start with the center letter and see how far you can get.
        </p>

        <section class="milestones-panel">
          <div class="panel-heading">
            <h2>Milestones</h2>
          </div>
          <div class="milestone-grid" id="milestone-grid"></div>
        </section>

        <section class="words-panel">
          <div class="panel-heading">
            <h2>Accepted words</h2>
          </div>
          <div class="accepted-words" id="accepted-words"></div>
        </section>
      </section>
    </main>

  </div>

  <div
    class="celebration-banner"
    id="celebration-banner"
    aria-live="polite"
    style="position:fixed;left:50%;top:50%;transform:translate(-50%,-50%) scale(0.82);z-index:9999;pointer-events:none;"
  ></div>

  <div class="feedback-modal" id="feedback-modal" aria-live="assertive" aria-hidden="true">
    <div class="feedback-card">
      <div class="feedback-art" id="feedback-art" aria-hidden="true"></div>
      <strong class="feedback-title" id="feedback-title"></strong>
      <p class="feedback-copy" id="feedback-copy"></p>
      <button class="primary-button feedback-close" id="feedback-close" type="button">OK</button>
    </div>
  </div>

  <div class="confirm-modal" id="confirm-modal" aria-hidden="true">
    <div class="confirm-card" role="dialog" aria-modal="true" aria-labelledby="confirm-title">
      <strong class="confirm-title" id="confirm-title">Are you sure you want to end the game?</strong>
      <p class="confirm-copy">This will reveal every answer and mark the missed ones in red.</p>
      <div class="confirm-actions">
        <button class="secondary-button" id="confirm-cancel-button" type="button">Cancel</button>
        <button class="danger-button" id="confirm-give-up-button" type="button">End game</button>
      </div>
    </div>
  </div>

  <script src="game.js?v=20260412-pwa"></script>
</body>
</html>
